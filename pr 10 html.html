<!DOCTYPE html><html lang="en"><head> <title>Frames and Embedding Demo</title> <style> body { margin: 0;  font-family: Arial, sans-serif;} .container {   display: flex;height: 100vh;} .left-frame { width: 30%;  border-right: 2px solid black;} .right-frame { width: 70%; } iframe { width: 100%; height: 50%;  border: none; border: none;}
h2 {  text-align: center;background-color: lightblue; margin: 0;  padding: 10px;} </style></head><body><h2>HTML Frames (iFrame) Demo</h2><div class="container"> <!-- Left Frame: External Website --> <div class="left-frame"> <iframe src="https://www.wikipedia.org"></iframe> </div> <!-- Right Frame: Map + Another Page --> <div class="right-frame">     <!-- Google Map Embed --><iframe src="https://www.google.com/maps?q=Nagpur&output=embed"></iframe>  <!-- Another External Page --><iframe src="https://example.com"></iframe> </div></div></body>
